<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="../CSS/Form.css">
    <link rel="icon" type="image/png" href="../Images/logo.jpg">
</head>
<body>
    <header>
        <nav class="menu">
            <ul>
                <li><a href="../../index.html">Home</a></li>
            </ul>
            <img src="../Images/logo.jpg" alt="Логотип магазину">
        </nav>
    </header>

    <main>
        <form>
            <!-- Perdonal info -->
            <div>
                <fieldset>
                    <legend>Personal info</legend>
                    <div>
                        <label for="name">First name</label>
                        <input type="text" name="name" id="name">
                    </div>
                    <div>
                        <br>
                        <label for="surname">Second name</label>
                        <input type="text" name="surname" id="surname">
                    </div>
                    <div>
                        <br>
                        <label for="birthday">Birthday</label>
                        <input type="datetime-local" name="birthday" id="birthday">
                    </div>
                    <div>
                        <p>Gender</p>
                        <label for="gender-m">Male</label>
                        <input type="radio" name="gender" id="gender-m" value="male">
                        <label for="gender-f">Female</label>
                        <input type="radio" name="gender" id="gender-f" value="Female">
                    </div>
                    <div>
                        <br>
                        <label for="drive-exp">Drive expirience</label>
                        <select name="drive-exp" id="drive-exp">
                            <option value="---" selected>---</option>
                            <option value="zero">Zero</option>
                            <option value="middle">Middle</option>
                            <option value="super">Super</option>
                        </select>
                    </div>
                </fieldset>
            </div>
            <!-- Contacts -->
            <div>
                <fieldset>
                    <legend>Contacts</legend>
                    <div>
                        
                        <label for="email">Email</label>
                        <input type="email" name="email" id="email">
                    </div>
                    <div>
                        <br>
                        <label for="phone">Phone</label>
                        <input type="tel" name="phone" id="phone">
                    </div>
                    <div>
                        <br>
                        <label for="addres">Addres</label>
                        <textarea name="addres" id="addres" rows="5" cols="20"></textarea>
                    </div>
                </fieldset>
            </div>
            <!-- Car info -->
            <div>
                <fieldset>
                    <legend>Car info</legend>
                    <div>
                        <label for="brand">Brand</label>
                        <select name="brand" id="brand">
                            <option value="---">---</option>
                            <option value="Ford">Ford</option>
                            <option value="Toyota">Toyota</option>
                            <option value="BMW">BMW</option>
                        </select>
                    </div>
                    <div>
                        <br>
                        <label for="model">Model</label>
                        <select name="model" id="model">
                            <option value="---">---</option>
                            <option value="Capri SUV">Capri SUV</option>
                            <option value="Mustang Convertible">Mustang Convertible</option>
                            <option value="bZ">bZ</option>
                            <option value="Supra">Supra</option>
                            <option value="i7">i7</option>
                            <option value="XM">XM</option>
                        </select>
                    </div>
                    <div>
                        <br>
                        <label for="used">Used</label>
                        <input type="checkbox" id="used" name="used">
                    </div>
                    <div>
                        <br>
                        <p>Color</p>
                        <label for="color-red">Red</label>
                        <input type="radio" name="color" id="color-red" value="red" checked>
                        <label for="color-black">Black</label>
                        <input type="radio" name="color" id="color-black"  value="black">
                        <label for="color-blue">Blue</label>
                        <input type="radio" name="color" id="color-blue"  value="blue">
                        <label for="color-white">White</label>
                        <input type="radio" name="color" id="color-white"  value="white">
                        <label for="color-grey">Grey</label>
                        <input type="radio" name="color" id="color-grey"  value="grey">
                    </div>
                    <div class="car-info">
                        <br>
                        <label for="range">Price</label>
                        <input type="range" name="price" id="range" min="0" max="10000" step="1000"
                        list="money">
                        <datalist id="money">
                            <option value="0" label="0"></option>
                            <option value="1000" label="1k"></option>
                            <option value="2000" label="2k"></option>
                            <option value="3000" label="3k"></option>
                            <option value="4000" label="4k"></option>
                            <option value="5000" label="5k"></option>
                            <option value="6000" label="6k"></option>
                            <option value="7000" label="7k"></option>
                            <option value="8000" label="8k"></option>
                            <option value="9000" label="9k"></option>
                            <option value="10000" label="10k"></option>
                        </datalist>
                    </div>
                </fieldset>
            </div>
            <br>
            <button type="reset">Cancel</button>
            <button type="submit">Ok</button>
        </form>
    </main>

     <footer class="footer">
        <div>
            <h2>Наша адреса:</h2>
            <p>вул.Чарівна 120</p> 
            <p>м. Запоріжжя</p>
        </div>
        <div>
            <h2>Наші контакти:</h2>
            <a href="mailto:test@test.com">Пошта</a>
            <a href="tel:+380123456789">Телефон</a> 
        </div>
        <div>
            <h2>Наш сайт:</h2>
            <a href="https://developer.mozilla.org/en-US/" target="_blank">Перейти на сайт</a>
        </div>
    </footer>
    
</body>
</html>
